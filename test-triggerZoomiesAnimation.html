<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test triggerZoomiesAnimation</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #FFF7AE 0%, #C8FACC 100%);
      min-height: 100vh;
    }
    
    #test-element {
      width: 100px;
      height: 100px;
      background-color: #FFD84D;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    /* Fast-shake animation for zoomies behavior */
    @keyframes fast-shake {
      0% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(20deg);
      }
      75% {
        transform: rotate(-20deg);
      }
      100% {
        transform: rotate(0deg);
      }
    }
    
    .fast-shake {
      animation: fast-shake 0.2s ease-in-out 3;
    }
    
    /* Fade-out animation for speed line emojis */
    @keyframes fade-out {
      0% {
        opacity: 1.0;
      }
      100% {
        opacity: 0;
      }
    }
    
    .fade-out {
      animation: fade-out 1s ease-in-out forwards;
    }
    
    .controls {
      position: fixed;
      top: 20px;
      left: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 5px 0;
    }
    
    button:hover {
      background: #45a049;
    }
    
    .log {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <h3>Test triggerZoomiesAnimation</h3>
    <button onclick="testZoomies()">Trigger Zoomies</button>
    <button onclick="clearLog()">Clear Log</button>
    <div class="log" id="log"></div>
  </div>
  
  <div id="test-element">🌻</div>

  <script>
    /**
     * Spawns a speed line emoji (💨) at the given position
     * Emoji fades out and is removed from DOM after 1 second
     */
    function spawnSpeedLineEmoji(x, y) {
      const emoji = document.createElement('div');
      emoji.textContent = '💨';
      emoji.style.position = 'absolute';
      emoji.style.left = `${x - 30}px`;
      emoji.style.top = `${y}px`;
      emoji.style.fontSize = '2rem';
      emoji.style.pointerEvents = 'none';
      emoji.classList.add('fade-out');
      
      document.body.appendChild(emoji);
      log('Speed line emoji spawned at (' + x + ', ' + y + ')');
      
      setTimeout(() => {
        try {
          document.body.removeChild(emoji);
          log('Speed line emoji removed');
        } catch (err) {
          console.warn('Failed to remove emoji element:', err);
        }
      }, 1000);
    }
    
    /**
     * Triggers the zoomies animation on the element
     * Adds fast-shake class, moves element to random position, spawns speed line emojis
     */
    function triggerZoomiesAnimation(element) {
      if (!element) {
        log('ERROR: Element is null');
        return;
      }
      
      log('Starting zoomies animation...');
      
      // Add fast-shake animation class
      element.classList.add('fast-shake');
      log('Added fast-shake class');
      
      // Get random position within viewport bounds (20% to 80% of viewport)
      const viewportWidth = window.innerWidth || 800;
      const viewportHeight = window.innerHeight || 600;
      const randomX = viewportWidth * (0.2 + Math.random() * 0.6);
      const randomY = viewportHeight * (0.2 + Math.random() * 0.6);
      
      log('Random position: (' + randomX.toFixed(0) + ', ' + randomY.toFixed(0) + ')');
      log('Viewport: ' + viewportWidth + 'x' + viewportHeight);
      
      // Move element to random position
      element.style.position = 'absolute';
      element.style.left = `${randomX}px`;
      element.style.top = `${randomY}px`;
      element.style.transform = 'translate(-50%, -50%)';
      log('Element moved to new position');
      
      // Spawn speed line emojis near the sunflower
      spawnSpeedLineEmoji(randomX, randomY);
      
      // Remove fast-shake class after animation completes
      // Fast-shake duration is 0.2s * 3 iterations = 0.6s (600ms)
      setTimeout(() => {
        element.classList.remove('fast-shake');
        log('Removed fast-shake class - animation complete');
      }, 600);
    }
    
    function testZoomies() {
      const element = document.getElementById('test-element');
      triggerZoomiesAnimation(element);
    }
    
    function log(message) {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }
    
    // Initial log
    log('Test page loaded. Click "Trigger Zoomies" to test the function.');
  </script>
</body>
</html>
